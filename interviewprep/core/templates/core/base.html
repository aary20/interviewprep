{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InterviewPrep AI</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <!-- CSS Files -->
    <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
    <link rel="stylesheet" href="{% static 'core/css/form.css' %}">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Internal Styles -->
    <style>
        /* Background Image and Global Styling */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: url("{% static 'images/bg_base.jpeg' %}") no-repeat center center fixed;
            background-size: cover;
            color: #1c1c1e;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 100vh;
            animation: fadeIn 1.5s ease-in;
        }

        /* Fade In Animation */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Slide Up Animation for Form */
        @keyframes slideUp {
            0% { transform: translateY(40px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        header {
            background-color: rgba(255, 255, 255, 0.85);
            text-align: center;
            padding: 40px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 50px;
            color: #2d3436;
            font-weight: 700;
        }

        footer {
            background-color: rgba(255, 255, 255, 0.85);
            text-align: center;
            padding: 15px 0;
            color: #636e72;
        }

        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .form-container {
            background-color: rgba(255, 255, 255, 0.92);
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            max-width: 500px;
            width: 100%;
            animation: slideUp 1s ease-out;
        }

        .form-container h2 {
            margin-bottom: 20px;
            color: #0984e3;
            font-size: 24px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 20px;
            border: 2px solid #74b9ff;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        input:focus, textarea:focus {
            border-color: #0984e3;
            box-shadow: 0 0 5px rgba(9,132,227,0.5);
            outline: none;
        }

        .btn {
            padding: 12px 28px;
            font-size: 18px;
            background-color: #0984e3;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #74b9ff;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <header>
        <h1>InterviewPrep AI</h1>
    </header>

    <div class="content">
        {% block content %}
        <div class="form-container">
            <h2>Prepare for your Interview</h2>
            <form>
                <input type="text" name="job-title" placeholder="Enter the job role" required>
                <textarea name="resume" placeholder="Paste your resume here" rows="6" required></textarea>
                <button type="submit" class="btn">Get Interview Questions</button>
            </form>
        </div>
        {% endblock %}
    </div>

    <footer>
        &copy; 2025 Aarya Patel
    </footer>

    <script>
        document.querySelector('form').addEventListener('submit', function(event) {
            event.preventDefault();
            alert('Interview questions will be generated for the provided job role and resume.');
        });
    </script>
</body>
</html>
