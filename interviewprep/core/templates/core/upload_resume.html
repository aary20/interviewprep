{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Resume - Interview Prep</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f7f7f7; padding: 50px; }
        h2 { font-size: 2em; color: #333; }
        input[type="file"] { display: none; }
        label { background-color: #007bff; color: white; padding: 15px 30px; border-radius: 8px; cursor: pointer; transition: background-color 0.3s; }
        label:hover { background-color: #0056b3; }
        button { background-color: #28a745; color: white; padding: 15px 30px; border-radius: 8px; font-size: 1.2em; margin-top: 20px; transition: background-color 0.3s; }
        button:hover { background-color: #218838; }
        .container { text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Upload Your Resume</h1>
    
        {% if messages %}
            {% for message in messages %}
            <p style="color: green;">{{ message }}</p>
            {% endfor %}
        {% endif %}
    
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Upload and Analyze</button>
        </form>
    
        <br>
        <a href="{% url 'dashboard' %}">Back to Dashboard</a>
    </div>
</body>
</html>
