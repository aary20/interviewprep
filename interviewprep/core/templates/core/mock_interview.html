{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Interview</title>
    <style>
        body { padding: 50px; font-family: Arial, sans-serif; background-color: #f4f4f9; }
        h2 { font-size: 2.5em; color: #333; }
        .question-box { font-size: 1.5em; margin: 20px 0; color: #444; }
        textarea { width: 100%; height: 100px; margin-top: 10px; padding: 10px; font-size: 1.2em; border-radius: 8px; border: 1px solid #ccc; }
        button { padding: 12px 24px; font-size: 1.2em; background-color: #17a2b8; color: white; border-radius: 8px; cursor: pointer; margin-top: 20px; }
        button:hover { background-color: #138496; }
        .record-buttons { margin-top: 30px; }
    </style>
</head>
<body>
    <h1>Mock Interview</h1>

    {% if question %}
        <h3>Question {{ current_index }} of {{ total_questions }}</h3>
        <p>{{ question }}</p>

        <form method="POST">
            {% csrf_token %}
            <!-- Text Answer Option -->
            <textarea id="answer" name="answer" rows="5" cols="50" placeholder="Type your answer here..." required></textarea><br><br>

            <!-- Voice Recording Option -->
            <button type="button" id="start-recording">🎤 Start Recording</button>
            <button type="button" id="stop-recording" disabled>🛑 Stop Recording</button>
            <input type="hidden" name="question" value="{{ question }}">

            <p id="recording-status"></p>

            <br><br>
            <button type="submit">Submit Answer</button>
        </form>
    {% else %}
        <p>No questions available. Please go back and generate questions.</p>
    {% endif %}

    <br>
    <a href="{% url 'dashboard' %}">Exit to Dashboard</a>

    <!-- Speech-to-Text Script -->
    <script>
        let recognition;
        let isRecording = false;

        if ('webkitSpeechRecognition' in window) {
            recognition = new webkitSpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript;
                document.getElementById('answer').value = transcript;
            };

            recognition.onstart = function() {
                document.getElementById('recording-status').innerText = "Recording... Speak now.";
            };

            recognition.onend = function() {
                document.getElementById('recording-status').innerText = "Recording stopped.";
            };

            document.getElementById('start-recording').onclick = function() {
                if (!isRecording) {
                    recognition.start();
                    isRecording = true;
                    document.getElementById('start-recording').disabled = true;
                    document.getElementById('stop-recording').disabled = false;
                }
            };

            document.getElementById('stop-recording').onclick = function() {
                if (isRecording) {
                    recognition.stop();
                    isRecording = false;
                    document.getElementById('start-recording').disabled = false;
                    document.getElementById('stop-recording').disabled = true;
                }
            };
        } else {
            alert("Sorry, your browser does not support Speech Recognition. Please use Chrome browser.");
        }
        let recorder, audioChunks;

        async function startRecording() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(stream);
        audioChunks = [];

        recorder.ondataavailable = e => audioChunks.push(e.data);
        recorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks);
            const formData = new FormData();
            formData.append("audio", audioBlob, "answer.wav");

            await fetch("{% url 'save_voice_answer' %}", {
            method: "POST",
            body: formData,
            headers: { "X-CSRFToken": "{{ csrf_token }}" }
            });
            alert("Audio submitted!");
        };

        recorder.start();
        }

        function stopRecording() {
        recorder.stop();
        }
    </script>
</body>
</html>
