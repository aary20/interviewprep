<!DOCTYPE html>
<html>
<head>
    <title>Your Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            padding: 20px; 
            font-family: 'Poppins', sans-serif;
            background: url("https://images.pexels.com/photos/5668858/pexels-photo-5668858.jpeg") no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            margin: 0;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }

        h1 {
            color: #74b9ff;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h3 {
            color: #0984e3;
            font-size: 1.8em;
            margin: 20px 0;
        }

        .card { 
            background-color: rgba(0, 0, 0, 0.8);
            border: 1px solid #74b9ff;
            padding: 25px;
            margin: 15px 0;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background-color: rgba(0, 0, 0, 0.6);
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #74b9ff;
        }

        th {
            background-color: rgba(9, 132, 227, 0.3);
            color: #74b9ff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            color: #ffffff;
        }

        a {
            color: #74b9ff;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        a:hover {
            color: #0984e3;
        }

        #curve_chart {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            border: 1px solid #74b9ff;
        }
    </style>
</head>
<body>
    <h1>Welcome, {{ request.user.username }}!</h1>
    <h3>Your Interview Attempts</h3>

    <table border="1">
        <thead>
            <tr>
                <th>Date</th>
                <th>Question</th>
                <th>Score</th>
                <th>Details</th>
            </tr>
        </thead>
        <tbody>
            {% for answer in user_answers %}
            <tr>
                <td>{{ answer.timestamp.date }}</td>
                <td>{{ answer.question|truncatewords:8 }}</td>
                <td>{{ answer.final_score }}/100</td>
                <td><a href="{% url 'view_report' answer.id %}">View</a></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <!-- Load Google Charts -->
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

    <script type="text/javascript">
        google.charts.load('current', {'packages':['corechart']});
        google.charts.setOnLoadCallback(drawChart);

        function drawChart() {
        var data = google.visualization.arrayToDataTable([
            ['Date', 'Score'],
            {% for answer in user_answers reversed %}
            ['{{ answer.timestamp.date }}', {{ answer.final_score }}],
            {% endfor %}
        ]);

        var options = {
            title: 'Interview Score Progress',
            curveType: 'function',
            legend: { position: 'bottom' }
        };

        var chart = new google.visualization.LineChart(document.getElementById('curve_chart'));
        chart.draw(data, options);
        }
    </script>

    <div id="curve_chart" style="width: 900px; height: 500px"></div>

</body>
</html>

</body>
</html>
